spring.application.name=demo

# Configuraçőes do Banco de Dados H2
spring.datasource.url = jdbc:h2:mem:demo
spring.datasource.driverClassName = org.h2.Driver
spring.datasource.username = sa
spring.datasource.password =
spring.jpa.database-platform = org.hibernate.dialect.H2Dialect

# Habilita o console do H2 para vocę ver as tabelas no navegador (localhost:8080/h2-console)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
# Faz o Hibernate mostar os comandos SQL no console (bom para debug)
spring.jpa.show-sql=true

#Cria as tabelas automaticamente com base nas entidades (@Entity)
spring.jpa.hibernate.ddl-auto=update
