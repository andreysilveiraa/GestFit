<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GestFit - Dashboard</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<div class="container mt-5">
    <div class="row">
        <div class="col-md-6">
            <h3>Login de Funcionário</h3>
            <form th:action="@{/acesso/entrar}" method="post" class="border p-4 rounded shadow-sm">
                <div class="mb-3">
                    <label class="form-label">Login</label>
                    <input type="text" name="login" class="form-control" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">Senha</label>
                    <input type="password" name="senha" class="form-control" required>
                </div>
                <button type="submit" class="btn btn-primary">Entrar</button>
            </form>
        </div>

        <div class="col-md-6">
            <h3>Registrar Entrada (Aluno)</h3>
            <form th:action="@{/acesso/registrar-presenca}" method="post" class="border p-4 rounded shadow-sm">
                <div class="mb-3">
                    <label class="form-label">ID do Aluno</label>
                    <input type="number" name="alunoId" class="form-control" placeholder="Digite o ID do aluno" required>
                </div>
                <button type="submit" class="btn btn-success">Registrar Presença</button>
            </form>
        </div>
    </div>
</div>

<body>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
