<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GestFit - Gestão de Alunos</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <style>
    :root { --sidebar-width: 260px; --primary-color: #0F6E56; --bg-light: #f3f4f6; }
    body { background-color: var(--bg-light); font-family: 'Segoe UI', sans-serif; }
    .sidebar { width: var(--sidebar-width); height: 100vh; background: #111827; color: white; position: fixed; padding: 20px; }
    .nav-link { color: #9ca3af; padding: 12px 15px; border-radius: 8px; display: flex; align-items: center; gap: 10px; text-decoration: none; transition: 0.3s; }
    .nav-link:hover, .nav-link.active { background: var(--primary-color); color: white; }
    .main-content { margin-left: var(--sidebar-width); padding: 40px; }
    .table-container { background: white; border-radius: 12px; padding: 25px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); }
  </style>
</head>
<body>

<div class="sidebar">
  <div class="d-flex align-items-center gap-2 mb-5 px-2">
    <div style="background: var(--primary-color); width:35px; height:35px; border-radius:8px; display:flex; align-items:center; justify-content:center; font-weight:bold;">G</div>
    <span class="fs-4 fw-bold">GestFit</span>
  </div>
  <nav class="d-flex flex-column gap-2">
    <a href="/dashboard" class="nav-link"><i class="fa-solid fa-chart-line"></i> Dashboard</a>
    <a href="/funcionarios" class="nav-link"><i class="fa-solid fa-users-gears"></i> Funcionários</a>
    <a href="/alunos" class="nav-link"><i class="fa-solid fa-user-graduate"></i> Gestão de Alunos</a>
    <a href="/financeiro/painel" class="nav-link"><i class="fa-solid fa-file-invoice-dollar"></i> Módulo Financeiro</a>
    <a href="/despesas" class="nav-link"><i class="fa-solid fa-wallet"></i> Despesas</a>
    <hr class="text-secondary">
    <a href="/" class="nav-link text-danger"><i class="fa-solid fa-right-from-bracket"></i> Sair</a>
  </nav>
</div>

<div class="main-content">
  <div class="d-flex justify-content-between align-items-center mb-4">
    <h2 class="fw-bold">Gestão de Alunos</h2>
    <button class="btn btn-success"
            style="background-color: var(--primary-color);"
            data-bs-toggle="modal"
            data-bs-target="#modalAluno">
      + Matricular Aluno
    </button>
  </div>

  <div class="table-container">
    <table class="table table-hover">
      <thead class="table-light">
      <tr>
        <th>ID</th>
        <th>Nome do Aluno</th>
        <th>CPF</th>
        <th>Plano</th>
        <th>Status</th>
        <th>Ações</th>
      </tr>
      </thead>
      <tbody>
      <tr th:each="aluno : ${listaAlunos}">
        <td th:text="${aluno.id}">1</td>

        <td class="fw-semibold" th:text="${aluno.nome}">Rodrigo Silva</td>

        <td th:text="${aluno.cpf}">000.111.222-33</td>

        <td>
      <span class="badge bg-secondary-subtle text-dark"
            th:text="${aluno.tipoPlano != null ? aluno.tipoPlano : 'ANUAL'}">
        Plano Anual
      </span>
        </td>

        <td>
          <div th:switch="${aluno.statusMatricula != null ? aluno.statusMatricula.name() : 'ATIVA'}">
            <span th:case="'ATIVA'" class="badge bg-success-subtle text-success">ATIVA</span>
            <span th:case="'PENDENTE'" class="badge bg-danger text-white">PENDENTE</span>
            <span th:case="'VENCIDA'" class="badge text-white" style="background-color: #fd7e14 !important;">VENCIDA</span>
            <span th:case="'TRANCADA'" class="badge" style="background-color: #e0f2fe; color: #0369a1;">TRANCADA</span>
            <span th:case="'CANCELADA'" class="badge bg-secondary-subtle text-secondary">CANCELADA</span>
            <span th:case="*" class="badge bg-success-subtle text-success">ATIVA</span>
          </div>
        </td>

        <td>
          <button class="btn btn-sm btn-outline-secondary"><i class="fa-solid fa-eye"></i></button>
        </td>
      </tr>
      </tbody>
    </table>
  </div>
</div>
<div class="modal fade" id="modalAluno" tabindex="-1" aria-labelledby="modalAlunoLabel" aria-hidden="true">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title" id="modalAlunoLabel">Matricular Novo Aluno</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
      </div>

      <form th:action="@{/alunos/salvar}" th:object="${novoAluno}" method="POST">
        <div class="modal-body">

          <div class="mb-3">
            <label class="form-label">Nome Completo</label>
            <input type="text" class="form-control" name="nome" required>
          </div>

          <div class="mb-3">
            <label class="form-label">CPF</label>
            <input type="text" class="form-control" name="cpf" required>
          </div>

          <div class="mb-3">
            <label class="form-label">Plano de Matrícula</label>
            <select class="form-select" name="tipoPlano" required>
              <option th:each="plano : ${planoOpcoes}" th:value="${plano}" th:text="${plano}"></option>
            </select>
          </div>

          <div class="mb-3">
            <label class="form-label">Status da Matrícula</label>
            <select class="form-select" name="statusMatricula">
              <option th:each="status : ${statusOpcoes}" th:value="${status}" th:text="${status}"></option>
            </select>
          </div>

        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
          <button type="submit" class="btn btn-success">Confirmar Matrícula</button>
        </div>
      </form>

    </div>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
