<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GestFit - Dashboard</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <style>
    :root { --sidebar-width: 260px; --primary-color: #0F6E56; --bg-light: #f3f4f6; }
    body { background-color: var(--bg-light); font-family: 'Segoe UI', sans-serif; }
    .sidebar { width: var(--sidebar-width); height: 100vh; background: #111827; color: white; position: fixed; padding: 20px; }
    .nav-link { color: #9ca3af; padding: 12px 15px; border-radius: 8px; display: flex; align-items: center; gap: 10px; text-decoration: none; transition: 0.3s; }
    .nav-link:hover, .nav-link.active { background: var(--primary-color); color: white; }
    .main-content { margin-left: var(--sidebar-width); padding: 40px; }
    .card-stats { background: white; border-radius: 12px; padding: 20px; border: none; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); transition: 0.2s; }
    .card-stats:hover { transform: translateY(-3px); }
    .icon-box { width: 45px; height: 45px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 20px; }
  </style>
</head>
<body>

<div class="sidebar">
  <div class="d-flex align-items-center gap-2 mb-5 px-2">
    <div style="background: var(--primary-color); width:35px; height:35px; border-radius:8px; display:flex; align-items:center; justify-content:center; font-weight:bold;">G</div>
    <span class="fs-4 fw-bold">GestFit</span>
  </div>
  <nav class="d-flex flex-column gap-2">
    <a href="/dashboard" class="nav-link"><i class="fa-solid fa-chart-line"></i> Dashboard</a>
    <a href="/funcionarios" class="nav-link"><i class="fa-solid fa-users-gears"></i> Funcionários</a>
    <a href="/alunos" class="nav-link"><i class="fa-solid fa-user-graduate"></i> Gestão de Alunos</a>
    <a href="/financeiro/painel" class="nav-link"><i class="fa-solid fa-file-invoice-dollar"></i> Módulo Financeiro</a>
    <a href="/despesas" class="nav-link"><i class="fa-solid fa-wallet"></i> Despesas</a>
    <hr class="text-secondary">
    <a href="/" class="nav-link text-danger"><i class="fa-solid fa-right-from-bracket"></i> Sair</a>
  </nav>
</div>

<div class="main-content">
  <div class="mb-4">
    <h2 class="fw-bold">Visão Geral do Sistema</h2>
    <p class="text-secondary">Bem-vindo ao centro de controle da GestFit.</p>
  </div>

  <div class="row g-4 mb-5">
    <div class="col-md-3">
      <div class="card-stats d-flex align-items-center justify-content-between">
        <div>
          <span class="text-secondary small fw-bold">Alunos Ativos</span>
          <h3 class="fw-bold mb-0 mt-1">142</h3>
        </div>
        <div class="icon-box bg-success-subtle text-success"><i class="fa-solid fa-user-check"></i></div>
      </div>
    </div>
    <div class="col-md-3">
      <div class="card-stats d-flex align-items-center justify-content-between">
        <div>
          <span class="text-secondary small fw-bold">Presenças Hoje</span>
          <h3 class="fw-bold mb-0 mt-1">38</h3>
        </div>
        <div class="icon-box bg-primary-subtle text-primary"><i class="fa-solid fa-門-open"></i></div>
      </div>
    </div>
    <div class="col-md-3">
      <div class="card-stats d-flex align-items-center justify-content-between">
        <div>
          <span class="text-secondary small fw-bold">Faturamento (Mês)</span>
          <h3 class="fw-bold mb-0 mt-1 text-success">R$ 21.450</h3>
        </div>
        <div class="icon-box bg-success-subtle text-success"><i class="fa-solid fa-money-bill-trend-up"></i></div>
      </div>
    </div>
    <div class="col-md-3">
      <div class="card-stats d-flex align-items-center justify-content-between">
        <div>
          <span class="text-secondary small fw-bold">Taxa de Inadimplência</span>
          <h3 class="fw-bold mb-0 mt-1 text-danger">4.2%</h3>
        </div>
        <div class="icon-box bg-danger-subtle text-danger"><i class="fa-solid fa-triangle-exclamation"></i></div>
      </div>
    </div>
  </div>
</div>
</body>
</html>
