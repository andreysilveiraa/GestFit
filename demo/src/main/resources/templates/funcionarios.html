<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GestFit - Gestão de Funcionários</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root {
            --sidebar-width: 260px;
            --primary-color: #0F6E56;
            --bg-light: #f3f4f6;
        }

        body { background-color: var(--bg-light); font-family: 'Segoe UI', sans-serif; }

        /* Sidebar */
        .sidebar {
            width: var(--sidebar-width);
            height: 100vh;
            background: #111827;
            color: white;
            position: fixed;
            padding: 20px;
        }

        .nav-link {
            color: #9ca3af;
            padding: 12px 15px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            gap: 10px;
            text-decoration: none;
            transition: 0.3s;
        }

        .nav-link:hover, .nav-link.active {
            background: var(--primary-color);
            color: white;
        }

        /* Main Content */
        .main-content {
            margin-left: var(--sidebar-width);
            padding: 40px;
        }

        .card-stats {
            background: white;
            border-radius: 12px;
            padding: 20px;
            border: none;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1);
        }

        .table-container {
            background: white;
            border-radius: 12px;
            padding: 25px;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1);
        }

        .badge-role {
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
        }

        .role-gerente { background: #dcfce7; color: #166534; }
        .role-professor { background: #dbeafe; color: #1e40af; }
        .role-recepcao { background: #fef3c7; color: #92400e; }
    </style>
</head>
<body>

<div class="sidebar">
    <div class="d-flex align-items-center gap-2 mb-5 px-2">
        <div style="background: var(--primary-color); width:35px; height:35px; border-radius:8px; display:flex; align-items:center; justify-content:center; font-weight:bold;">G</div>
        <span class="fs-4 fw-bold">GestFit</span>
    </div>

    <nav class="d-flex flex-column gap-2">
        <a href="/dashboard" class="nav-link"><i class="fa-solid fa-chart-line"></i> Dashboard</a>
        <a href="/funcionarios" class="nav-link"><i class="fa-solid fa-users-gears"></i> Funcionários</a>
        <a href="/alunos" class="nav-link"><i class="fa-solid fa-user-graduate"></i> Gestão de Alunos</a>
        <a href="/financeiro/painel" class="nav-link"><i class="fa-solid fa-file-invoice-dollar"></i> Módulo Financeiro</a>
        <a href="/despesas" class="nav-link"><i class="fa-solid fa-wallet"></i> Despesas</a>
        <hr class="text-secondary">
        <a href="/" class="nav-link text-danger"><i class="fa-solid fa-right-from-bracket"></i> Sair</a>
    </nav>
</div>

<div class="main-content">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 class="fw-bold">Gestão de Funcionários</h2>
        <button class="btn btn-success" style="background-color: var(--primary-color);">+ Novo Funcionário</button>
    </div>

    <div class="row mb-4 g-3">
        <div class="col-md-4">
            <div class="card-stats">
                <span class="text-secondary small fw-bold">Total de Staff</span>
                <h3 class="fw-bold mb-0" th:text="${#lists.size(listaFuncionarios)}">0</h3>
            </div>
        </div>
        <div class="col-md-4">
            <div class="card-stats">
                <span class="text-secondary small fw-bold">Folha Mensal Estimada</span>
                <h3 class="fw-bold mb-0 text-success">R$ 15.000,00</h3>
            </div>
        </div>
    </div>

    <div class="table-container">
        <table class="table table-hover">
            <thead class="table-light">
            <tr>
                <th>Nome</th>
                <th>Matrícula</th>
                <th>Cargo</th>
                <th>Salário Base</th>
                <th>Turno</th>
                <th>Ações</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="f : ${listaFuncionarios}">
                <td>
                    <div class="d-flex align-items-center gap-2">
                        <div style="width:32px; height:32px; background:#e5e7eb; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:12px;" th:text="${#strings.substring(f.nome,0,1)}">U</div>
                        <span class="fw-semibold" th:text="${f.nome}">Nome</span>
                    </div>
                </td>
                <td th:text="${f.matricula}">M-001</td>
                <td>
        <span class="badge-role"
              th:classappend="${f instanceof T(com.gestfit.model.Gerente) ? 'role-gerente' : (f instanceof T(com.gestfit.model.Professor) ? 'role-professor' : 'role-recepcao')}"
              th:text="${f.cargo}">Cargo</span>
                </td>
                <td th:text="${'R$ ' + f.salarioBase}">R$ 0,00</td>
                <td th:text="${f.turno}">Manhã</td>
                <td>
                    <button class="btn btn-sm btn-outline-secondary"><i class="fa-solid fa-pen"></i></button>
                    <button class="btn btn-sm btn-outline-danger"><i class="fa-solid fa-trash"></i></button>
                </td>
            </tr>
            </tbody>
        </table>
    </div>
</div>

</body>
</html>
