<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GestFit - Despesas</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <style>
    :root { --sidebar-width: 260px; --primary-color: #0F6E56; --bg-light: #f3f4f6; }
    body { background-color: var(--bg-light); font-family: 'Segoe UI', sans-serif; }
    .sidebar { width: var(--sidebar-width); height: 100vh; background: #111827; color: white; position: fixed; padding: 20px; }
    .nav-link { color: #9ca3af; padding: 12px 15px; border-radius: 8px; display: flex; align-items: center; gap: 10px; text-decoration: none; transition: 0.3s; }
    .nav-link:hover, .nav-link.active { background: var(--primary-color); color: white; }
    .main-content { margin-left: var(--sidebar-width); padding: 40px; }
    .table-container { background: white; border-radius: 12px; padding: 25px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); }
  </style>
</head>
<body>

<div class="sidebar">
  <div class="d-flex align-items-center gap-2 mb-5 px-2">
    <div style="background: var(--primary-color); width:35px; height:35px; border-radius:8px; display:flex; align-items:center; justify-content:center; font-weight:bold;">G</div>
    <span class="fs-4 fw-bold">GestFit</span>
  </div>
  <nav class="d-flex flex-column gap-2">
    <a href="/dashboard" class="nav-link"><i class="fa-solid fa-chart-line"></i> Dashboard</a>
    <a href="/funcionarios" class="nav-link"><i class="fa-solid fa-users-gears"></i> Funcionários</a>
    <a href="/alunos" class="nav-link"><i class="fa-solid fa-user-graduate"></i> Gestão de Alunos</a>
    <a href="/financeiro/painel" class="nav-link"><i class="fa-solid fa-file-invoice-dollar"></i> Módulo Financeiro</a>
    <a href="/despesas" class="nav-link"><i class="fa-solid fa-wallet"></i> Despesas</a>
    <hr class="text-secondary">
    <a href="/" class="nav-link text-danger"><i class="fa-solid fa-right-from-bracket"></i> Sair</a>
  </nav>
</div>

<div class="main-content">
  <div class="d-flex justify-content-between align-items-center mb-4">
    <h2 class="fw-bold">Lançamento de Despesas</h2>
    <button type="button" class="btn btn-danger" data-bs-toggle="modal" data-bs-target="#modalDespesa">
      + Nova Despesa Manual
    </button>
  </div>

  <div class="table-container">
    <h5 class="fw-bold mb-4 text-secondary">Saídas do Caixa (Automatizadas e Manuais)</h5>
    <table class="table table-hover">
      <thead class="table-light">
      <tr>
        <th>Descrição da Despesa</th>
        <th>Categoria</th>
        <th>Data de Vencimento</th>
        <th>Valor total</th>
      </tr>
      </thead>
      <tbody>
      <tr th:each="d : ${listaDespesas}">
        <td class="fw-semibold" th:text="${d.descricao}">Folha de Pagamento - Mês 6</td>
        <td><span class="badge bg-danger-subtle text-danger" th:text="${d.categoria}">SALARIOS</span></td>
        <td th:text="${d.dataVencimento}">2026-06-11</td>
        <td class="fw-bold text-danger" th:text="${'R$ ' + d.valor}">R$ 15.000,00</td>
      </tr>
      </tbody>
    </table>
  </div>
</div>
<div class="modal fade" id="modalDespesa" tabindex="-1" aria-labelledby="modalDespesaLabel" aria-hidden="true">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title" id="modalDespesaLabel">Adicionar Nova Despesa</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
      </div>

      <form th:action="@{/despesas/salvar}" th:object="${novaDespesa}" method="POST">
        <div class="modal-body">

          <div class="mb-3">
            <label class="form-label">Descrição</label>
            <input type="text" class="form-control" name="descricao" required>
          </div>

          <div class="mb-3">
            <label class="form-label">Valor (R$)</label>
            <input type="number" step="0.01" class="form-control" name="valor" required>
          </div>

          <div class="mb-3">
            <label class="form-label">Data de Vencimento</label>
            <input type="date" class="form-control" name="dataVencimento" required>
          </div>

          <div class="mb-3">
            <label class="form-label">Categoria</label>
            <select class="form-select" name="categoria">
              <option th:each="cat : ${categorias}" th:value="${cat}" th:text="${cat}"></option>
            </select>
          </div>

        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
          <button type="submit" class="btn btn-success">Salvar Despesa</button>
        </div>
      </form>
    </div>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
